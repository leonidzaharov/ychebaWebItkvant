<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a9aaa"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Main frame bar -->
  <path d="M40,95 C40,85 55,75 80,73 L400,68 C425,67 445,72 450,82 L455,92 C458,100 452,108 440,110 L80,115 C55,117 40,110 40,95Z" fill="url(#frame)" filter="url(#shadow)"/>
  <!-- Frame thickness -->
  <path d="M40,95 C40,85 55,75 80,73 L400,68 C425,67 445,72 450,82" fill="none" stroke="#d4d4d4" stroke-width="1.5"/>
  <!-- Nosebridge -->
  <path d="M200,110 C210,125 220,130 230,130 C240,130 250,125 260,110" fill="none" stroke="#b0b0b0" stroke-width="3" stroke-linecap="round"/>
  <!-- Right ear piece -->
  <path d="M440,108 L460,105 C470,103 475,98 475,92 L475,88" fill="none" stroke="#a8a8a8" stroke-width="4" stroke-linecap="round"/>
  <!-- Left ear piece -->
  <path d="M55,112 L35,115 C25,117 18,112 15,105 L12,98" fill="none" stroke="#a8a8a8" stroke-width="4" stroke-linecap="round"/>
  <!-- Prism display module -->
  <rect x="395" y="58" width="52" height="34" rx="8" fill="url(#lens)" filter="url(#glow)" opacity="0.9"/>
  <!-- Camera lens -->
  <circle cx="420" cy="75" r="10" fill="#0c4a6e" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="420" cy="75" r="5" fill="#06b6d4"/>
  <circle cx="418" cy="73" r="2" fill="#67e8f9" opacity="0.6"/>
  <!-- LED indicator -->
  <circle cx="438" cy="66" r="2.5" fill="#22d3ee" opacity="0.8"/>
  <!-- Subtle reflection on frame -->
  <path d="M90,78 L350,73" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Ground shadow -->
  <ellipse cx="240" cy="165" rx="180" ry="12" fill="#06b6d4" opacity="0.06"/>
</svg>
