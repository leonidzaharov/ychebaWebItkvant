<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <defs>
    <linearGradient id="pole" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="40%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="tire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="shd">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Wheel -->
  <circle cx="140" cy="285" r="52" fill="url(#tire)" filter="url(#shd)"/>
  <circle cx="140" cy="285" r="48" fill="none" stroke="#f59e0b" stroke-width="4" opacity="0.7"/>
  <circle cx="140" cy="285" r="38" fill="#2a2a2a"/>
  <circle cx="140" cy="285" r="28" fill="#333" stroke="#444" stroke-width="1"/>
  <!-- Wheel spokes -->
  <line x1="140" y1="260" x2="140" y2="310" stroke="#555" stroke-width="1.5"/>
  <line x1="115" y1="285" x2="165" y2="285" stroke="#555" stroke-width="1.5"/>
  <line x1="122" y1="268" x2="158" y2="302" stroke="#555" stroke-width="1"/>
  <line x1="158" y1="268" x2="122" y2="302" stroke="#555" stroke-width="1"/>
  <!-- Hub -->
  <circle cx="140" cy="285" r="8" fill="#f59e0b" opacity="0.8"/>
  <circle cx="140" cy="285" r="4" fill="#fbbf24"/>
  <!-- Platform -->
  <rect x="85" y="230" width="110" height="18" rx="5" fill="url(#base)" filter="url(#shd)"/>
  <rect x="90" y="233" width="100" height="12" rx="3" fill="#555"/>
  <!-- Grip pads -->
  <rect x="95" y="235" width="20" height="8" rx="2" fill="#f59e0b" opacity="0.3"/>
  <rect x="165" y="235" width="20" height="8" rx="2" fill="#f59e0b" opacity="0.3"/>
  <!-- Steering pole -->
  <rect x="133" y="68" width="14" height="168" rx="7" fill="url(#pole)" filter="url(#shd)"/>
  <!-- Pole highlight -->
  <rect x="136" y="75" width="3" height="155" rx="1.5" fill="white" opacity="0.08"/>
  <!-- Handlebar -->
  <rect x="100" y="48" width="80" height="26" rx="13" fill="#3a3a3a" filter="url(#shd)"/>
  <rect x="108" y="54" width="64" height="14" rx="7" fill="#f59e0b" opacity="0.5"/>
  <!-- Display on handlebar -->
  <rect x="127" y="56" width="26" height="10" rx="3" fill="#1a1a1a"/>
  <rect x="130" y="58" width="20" height="6" rx="2" fill="#f59e0b" opacity="0.4"/>
  <!-- Ground shadow -->
  <ellipse cx="140" cy="345" rx="65" ry="8" fill="#f59e0b" opacity="0.06"/>
</svg>
